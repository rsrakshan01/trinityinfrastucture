<!-- ═══════════════════════════════════════════════
     BOOKING + CONTACT
═══════════════════════════════════════════════ -->
<section id="booking-section">
  <div class="booking-inner">

    <!-- Booking Form -->
    <div>
      <div class="section-tag" id="book-tag"></div>
      <h2 class="section-title" id="book-h"></h2>
      <p style="color:var(--muted-foreground);margin-bottom:2rem;" id="book-p"></p>

      <form class="booking-form" id="booking-form">
        <div class="form-group">
          <label class="form-label" id="field-name"></label>
          <input type="text" name="name" required class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" id="field-mobile"></label>
          <input type="tel" name="mobile" required class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" id="field-email"></label>
          <input type="email" name="email" required class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" id="field-date"></label>
          <input type="date" name="date" required class="form-input" />
        </div>
        <div class="form-group full">
          <label class="form-label" id="field-interest"></label>
          <select id="select-interest" class="form-select"></select>
        </div>
        <div class="form-group full">
          <label class="form-label" id="field-message"></label>
          <textarea name="message" rows="4" class="form-textarea"></textarea>
        </div>
        <button type="submit" class="btn-submit" id="btn-submit"></button>
      </form>
    </div>

    <!-- Contact Info -->
    <div id="contact">
      <div class="section-tag" id="contact-tag"></div>
      <h2 class="section-title" id="contact-h"></h2>

      <div class="contact-cards">
        <a href="tel:+919080987178" class="contact-card">
          <span class="contact-icon">📞</span>
          <div>
            <div class="contact-lbl" id="ccard-call-lbl"></div>
            <div class="contact-val">+91 90809 87178</div>
          </div>
        </a>
        <a href="https://wa.me/919080987178" target="_blank" rel="noreferrer" class="contact-card">
          <span class="contact-icon">💬</span>
          <div>
            <div class="contact-lbl" id="ccard-wa-lbl"></div>
            <div class="contact-val" id="ccard-wa-sub"></div>
          </div>
        </a>
        <a href="mailto:trinityinfra333@gmail.com" class="contact-card">
          <span class="contact-icon">✉</span>
          <div>
            <div class="contact-lbl" id="ccard-email-lbl"></div>
            <div class="contact-val">trinityinfra333@gmail.com</div>
          </div>
        </a>
      </div>
    </div>

  </div>
</section>
